server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: civiclens-api

  datasource:
    # Environment variables keep local, Render, and other deployment configuration separate from code.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/civiclens}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:root123}
    driver-class-name: org.postgresql.Driver

  # Serialize LocalDateTime fields as ISO-8601 strings instead of numeric arrays.
  jackson:
    serialization:
      write-dates-as-timestamps: false

  jpa:
    hibernate:
      # Flyway owns schema changes; Hibernate should not mutate production tables.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

civiclens:
  nyc-open-data:
    # Override with NYC_OPEN_DATA_BASE_URL env var for testing or alternate endpoints.
    base-url: ${NYC_OPEN_DATA_BASE_URL:https://data.cityofnewyork.us}
  cors:
    # Comma-separated origins; set CORS_ALLOWED_ORIGINS in production to the deployed frontend URL.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}